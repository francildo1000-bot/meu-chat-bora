<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Chat Bora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container">
        <header>
            <h2>Meu Zap Bora</h2>
        </header>
        <div id="chat-window"></div>
        <div id="input-area">
            <button id="gif-btn">🎬</button>
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="mic-btn">🎤</button>
            <button id="send-btn">✈️</button>
        </div>
    </div>

    <div id="gif-modal" style="display:none;">
        <input type="text" id="gif-search" placeholder="Procurar GIF...">
        <div id="gif-list"></div>
    </div>

    <audio id="notificacao-som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
