<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<div id="online-status" style="text-align: center; color: #00ff00; font-size: 14px; margin-bottom: 10px; font-family: sans-serif;">
    ● <span id="count-number">0</span> usuários online
</div>

<div class="input-area">
    <button id="toggle-menu" type="button" style="background:none; border:none; font-size:24px;">➕</button>
    
    <div id="attachment-menu" style="display: none; position: absolute; bottom: 70px; left: 10px; background: #111; border: 1px solid #00f2ff; border-radius: 10px; padding: 10px; flex-direction: column; gap: 15px; z-index: 100;">
        <button id="gif-btn" style="background:none; border:none; font-size:20px;">🎬 GIF</button>
        <button id="img-btn" style="background:none; border:none; font-size:20px;">🖼️ Foto</button>
    </div>

    <input type="text" id="message-input" placeholder="Digite uma mensagem..." autocomplete="off">
    <button id="mic-btn">🎤</button>
    <button id="send-btn">✈️</button>
</div>
<input type="file" id="img-input" accept="image/*" style="display:none;">
