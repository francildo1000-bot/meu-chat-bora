<!DOCTYPE html>
<html lang="pt-br">
<head>

</head>
<body>
    <div id="chat-container">
        <header>
    <h1>Bora PROZEAR! 🚀</h1>
    <button id="clear-chat-btn" style="display:none; background:red; font-size:10px; margin-top:5px;">Apagar Tudo (ADM)</button>
</header>
        
        <div id="chat-window"></div>

        <div id="gif-modal">
            <input type="text" id="gif-search-input" placeholder="Pesquisar GIFs...">
            <div id="gif-list"></div>
        </div>

        <div class="input-area">
            <button id="gif-btn">GIF</button>
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <script src="script.js"></script>
</body>
<audio id="notificacao-som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
