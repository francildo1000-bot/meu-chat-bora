<!DOCTYPE html>
<html lang="pt-br">
<head>

</head>
<body>
    <div id="chat-container">
        <header>
    <h1>Bora PROZEAR! 🚀</h1>

</header>
        
        <div id="chat-window"></div>

        <div id="gif-modal">
            <input type="text" id="gif-search-input" placeholder="Pesquisar GIFs...">
            <div id="gif-list"></div>
        </div>

       <div class="input-area">
    <button id="gif-btn">GIF</button>
    
    <button id="mic-btn" type="button" style="background: none; border: none; font-size: 20px; cursor: pointer;">🎤</button>
    
    <input type="text" id="message-input" placeholder="Digite uma mensagem...">
    <button id="send-btn">Enviar</button>
</div>

<audio id="notificacao-som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
