<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Bate-Papo Realtime 💬</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <header>
            <h2>Bora Conversar! 🚀</h2>
            <small>Status: Conectado ao Firebase</small>
        </header>

        <div id="chat-window">
            </div>

        <form id="chat-form">
            <input type="text" id="msg-input" placeholder="Digite sua mensagem..." required autocomplete="off">
            <button type="submit" id="btn-enviar">➤</button>
        </form>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
