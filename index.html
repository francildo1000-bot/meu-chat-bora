<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bora PROZEAR! 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="notificacao-som" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="chat-container">
        <header>
            <h1>Bora PROZEAR! 🚀</h1>
        </header>

        <div id="gif-modal" style="display:none; background:#202c33; padding:10px; border: 1px solid #00a884;">
    <input type="text" id="gif-search-input" placeholder="Pesquisar GIFs..." style="width:100%; padding:10px; border-radius:5px;">
    
    <div id="gif-list" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; max-height:200px; overflow-y:auto; margin-top:10px;">
        </div>
</div>
        </div>

        <div id="chat-window"></div>

        <div class="input-area">
            <button id="gif-btn">GIF</button>
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
