<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Distrito Zero</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="chat-container">
        <header>
            <h1>DISTRITO ZERO</h1>
            <div id="online-status">
                ● <span id="count-number">0</span> online
            </div>
        </header>

        <div id="chat-window"></div>

        <div class="input-area">
            <button id="toggle-menu" type="button">➕</button>
            
            <div id="attachment-menu">
                <button id="gif-btn" type="button">🎬 GIF</button>
                <button id="img-btn" type="button">🖼️ Foto</button>
            </div>

            <input type="text" id="message-input" placeholder="Digite uma mensagem..." autocomplete="off">
            <button id="mic-btn">🎤</button>
            <button id="send-btn">✈️</button>
        </div>
    </div>

    <input type="file" id="img-input" accept="image/*" style="display:none;">

    <script src="script.js"></script>
</body>
</html>
