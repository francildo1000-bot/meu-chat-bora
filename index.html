<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Chat Bora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="notificacao-som" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div id="chat-container">
        <header>
            <h1>Bora PROZEAR! 🚀</h1>
        </header>
        
        <div id="gif-modal">
            <div id="gif-list">
                </div>
        </div>

        <div id="chat-window"></div>
        
        <div class="input-area">
            <button id="gif-btn">GIF</button>
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
