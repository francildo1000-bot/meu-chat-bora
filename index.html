<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bora PROZEAR! 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Bora PROZEAR! 🚀</h1>
        <div id="status-container">
            🟢 <span id="online-count">0</span> online
        </div>
    </header>

    <div id="chat-container">
        <div id="chat-window"></div>
        
        <div class="input-area">
            <button id="gif-btn">GIF</button>
            <button id="mic-btn" type="button">🎤</button>
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <div id="gif-modal" style="display:none;">
        <input type="text" id="gif-search" placeholder="Buscar GIF...">
        <div id="gif-list"></div>
    </div>

    <audio id="notificacao-som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
