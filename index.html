<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distrito Zero - Chat</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/626/626610.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container">   
        <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
            <h2 style="margin: 0;">Distrito Zero</h2>
            <div id="user-info" style="cursor: pointer; font-size: 14px; color: #00f2ff; font-family: 'Permanent Marker', cursive;">
                <span id="display-name"></span> ✏️
            </div>
        </header>

        <div id="online-bar" style="background: #0a0a0a; color: #00ff00; font-size: 11px; padding: 5px 15px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 8px;">
            <span class="dot" style="height: 8px; width: 8px; background-color: #00ff00; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #00ff00;"></span>
            <span id="count-number">0</span> usuários online
        </div>

        <div id="chat-window"></div>
        <div id="input-area">
            <button id="gif-btn">🎬</button>
            <button id="img-btn">🖼️</button>
            <input type="file" id="img-input" style="display:none" accept="image/*">
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="mic-btn">🎤</button>
            <button id="send-btn">✈️</button>
        </div>
    </div>

    <div id="gif-modal" style="display:none;">
        <input type="text" id="gif-search" placeholder="Procurar GIF...">
        <div id="gif-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Distrito Zero pronto para instalar!"))
            .catch(err => console.log("Erro no SW:", err));
        }
    </script>
</body>
</html>
