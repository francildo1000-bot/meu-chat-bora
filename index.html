<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bora PROZEAR! 🚀</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
    <div id="chat-container">
        <header>
            <h1>Bora PROZEAR! 🚀</h1>
        </header>

        <div id="gif-modal" style="display:none; background:#202c33; padding:10px;">
            <input type="text" id="gif-search-input" placeholder="Pesquisar GIFs...">
            <div id="gif-list"></div>
        </div>

        <div id="chat-window" style="flex:1; overflow-y:auto; min-height:400px;"></div>

        <div class="input-area">
            <button id="gif-btn">GIF</button>
            <input type="text" id="message-input" placeholder="Digite uma mensagem...">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</body>
</html>
